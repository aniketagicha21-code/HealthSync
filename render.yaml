# Render Blueprint: FastAPI API only (PostgreSQL on Supabase — see README).
# Set DATABASE_URL in the Render dashboard to your Supabase connection string.

services:
  - type: web
    name: healthsync-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # stderr is easy to miss in Render deploy logs; log to stdout + unbuffered Python.
    startCommand: python -u -m uvicorn app.main:app --host 0.0.0.0 --port $PORT --log-config uvicorn_log_render.json
    healthCheckPath: /api/health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: MAX_UPLOAD_MB
        value: "15"
