# Blueprint: FastAPI web service + Render managed PostgreSQL.
# DATABASE_URL is injected from the database (no manual copy/paste).

databases:
  - name: healthsync-db
    databaseName: healthsync
    user: healthsync
    plan: basic

services:
  - type: web
    name: healthsync-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -u -m uvicorn app.main:app --host 0.0.0.0 --port $PORT --log-config uvicorn_log_render.json
    healthCheckPath: /api/health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromDatabase:
          name: healthsync-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: MAX_UPLOAD_MB
        value: "15"
