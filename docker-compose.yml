services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: healthsync
    # Host 5433 avoids clashing with a local Postgres install (often bound to 5432 on macOS).
    ports:
      - "5433:5432"
    volumes:
      - healthsync_pg:/var/lib/postgresql/data

volumes:
  healthsync_pg:
